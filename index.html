<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="TicTacToe.css">
    <title>Dip's Tic Tac Toe</title>
</head>
<body>
    <h1>Dip's Tic Tac Toe</h1>
    <div class="msg-container hide">
        <p id="msg">Winner</p>
        <button class="new-btn borde">New Game</button>
    </div>
    <main>
        <div class="turn-select">
            <button id="startX" class="turn borde">Start With X</button>
            <button id="startO" class="turn borde">Start With O</button>
        </div>
        <p id="turn">Select First Turn</p>
        <div class="container">
          <div class="game">
              <button class="box border"></button>
              <button class="box border"></button>
              <button class="box border"></button>
              <button class="box border"></button>
              <button class="box border"></button>
              <button class="box border"></button>
              <button class="box border"></button>
              <button class="box border"></button>
              <button class="box border"></button>
          </div>
        </div>
        <button class="reset-btn borde">Reset Game</button>
    </main>
    <script src="TicTacToe.js"></script>
</body>
</html>
